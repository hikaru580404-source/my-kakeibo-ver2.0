<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#4f46e5" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="5bb68a087c3f" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>予算管理 | マイ家計簿</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="budget.css" />
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <div class="header-logo">
      <a href="index.html" style="color:inherit;text-decoration:none;display:flex;align-items:center;gap:6px;">
        <i class="fas fa-chevron-left" style="font-size:.85rem;opacity:.8;"></i>
        <i class="fas fa-bullseye"></i>
        <span>予算管理</span>
      </a>
    </div>
    <div class="header-nav">
      <a href="form.html" class="btn-form-link" title="収支を入力"><i class="fas fa-pen-alt"></i><span>入力</span></a>
      <a href="summary.html" class="btn-form-link" title="分析"><i class="fas fa-chart-bar"></i><span>分析</span></a>
      <a href="index.html" class="btn-form-link" title="ダッシュボード"><i class="fas fa-home"></i><span>HOME</span></a>
    </div>
  </div>
</header>

<main class="app-main">
  <div class="summary-month-bar">
    <button class="month-nav-btn-sm" id="prevMonthBtn"><i class="fas fa-chevron-left"></i></button>
    <div class="summary-month-label" id="budgetMonthLabel">──年──月</div>
    <button class="month-nav-btn-sm" id="nextMonthBtn"><i class="fas fa-chevron-right"></i></button>
    <select class="summary-month-jump" id="monthJump"></select>
  </div>

  <div class="budget-actions">
    <button class="btn-budget-action primary" id="copyFromPrevBtn"><i class="fas fa-copy"></i> 前月実績から予算コピー</button>
    <button class="btn-budget-action secondary" id="saveAllBudgetsBtn"><i class="fas fa-save"></i> 予算を保存する</button>
  </div>

  <div class="budget-box-overview" id="budgetBoxOverview"></div>

  <div class="summary-card">
    <div class="summary-card-header abox-header"><span class="box-badge abox">A</span><span>A箱 ― 事業経費</span><span class="box-total-label" id="boxTotalA"></span></div>
    <div class="budget-category-list" id="budgetListA"></div>
  </div>

  <div class="summary-card">
    <div class="summary-card-header bbox-header"><span class="box-badge bbox">B</span><span>B箱 ― 個人消費</span><span class="box-total-label" id="boxTotalB"></span></div>
    <div class="budget-category-list" id="budgetListB"></div>
  </div>

  <div class="summary-card">
    <div class="summary-card-header cbox-header"><span class="box-badge cbox">C</span><span>C箱 ― 固定費</span><span class="box-total-label" id="boxTotalC"></span></div>
    <div class="budget-category-list" id="budgetListC"></div>
  </div>
</main>

<div class="modal-overlay" id="copyConfirmModal" style="display:none;">
  <div class="modal-box">
    <div class="modal-title"><i class="fas fa-copy"></i> 前月実績コピー</div>
    <div class="modal-body" id="copyConfirmBody">前月の実績金額を今月の予算にコピーします。<br>既存の予算は上書きされます。よろしいですか？</div>
    <div class="modal-actions">
      <button class="btn-modal-cancel" id="copyModalCancelBtn">キャンセル</button>
      <button class="btn-modal-confirm primary" id="copyModalConfirmBtn">コピーする</button>
    </div>
  </div>
</div>

<div class="loading-overlay hidden" id="loadingOverlay"><div class="loading-spinner"></div></div>
<div id="toast" class="toast"></div>

<script type="module" src="budget.js"></script>
</body>
</html>
