<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン・新規登録 - マイ家計簿</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background: #f0f2f7;">
  <div class="login-container">
    <h1 class="login-title" id="authTitle">マイ家計簿 ログイン</h1>
    
    <form id="authForm">
      <div class="login-form-group">
        <label class="login-label" for="email">メールアドレス</label>
        <input type="email" id="email" class="login-input" required>
      </div>
      <div class="login-form-group">
        <label class="login-label" for="password">パスワード</label>
        <input type="password" id="password" class="login-input" minlength="6" placeholder="6文字以上" required>
      </div>
      
      <button type="submit" class="login-btn" id="authSubmitBtn">ログイン</button>
      
      <div id="authMsg" class="login-msg"></div>
    </form>

    <div class="auth-toggle">
      <a href="#" id="toggleAuthMode">アカウントをお持ちでない方はこちら（新規登録）</a>
    </div>
  </div>

  <script type="module" src="login.js"></script>
</body>
</html>
