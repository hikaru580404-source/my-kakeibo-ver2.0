<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>月次サマリー | マイ家計簿</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="summary.css" />
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <div class="header-logo">
      <a href="index.html" style="color:inherit;text-decoration:none;display:flex;align-items:center;gap:6px;">
        <i class="fas fa-chevron-left" style="font-size:.85rem;opacity:.8;"></i>
        <i class="fas fa-chart-bar"></i>
        <span>月次サマリー</span>
      </a>
    </div>
    <div class="header-nav">
      <a href="form.html" class="btn-form-link" title="収支を入力"><i class="fas fa-pen-alt"></i><span>入力</span></a>
      <a href="budget.html" class="btn-form-link" title="予算管理"><i class="fas fa-bullseye"></i><span>予算</span></a>
      <a href="index.html" class="btn-form-link" title="ダッシュボード"><i class="fas fa-home"></i><span>HOME</span></a>
    </div>
  </div>
</header>

<main class="app-main">
  <div class="summary-month-bar">
    <button class="month-nav-btn-sm" id="prevMonthBtn"><i class="fas fa-chevron-left"></i></button>
    <div class="summary-month-label" id="summaryMonthLabel">──年──月</div>
    <button class="month-nav-btn-sm" id="nextMonthBtn"><i class="fas fa-chevron-right"></i></button>
    <select class="summary-month-jump" id="monthJump"></select>
  </div>

  <div class="summary-kpi-grid" id="summaryKpi">
    <div class="s-kpi-card income"><div class="s-kpi-icon"><i class="fas fa-arrow-down"></i></div><div class="s-kpi-body"><div class="s-kpi-label">収入合計</div><div class="s-kpi-value" id="skIncome">¥0</div></div></div>
    <div class="s-kpi-card expense"><div class="s-kpi-icon"><i class="fas fa-arrow-up"></i></div><div class="s-kpi-body"><div class="s-kpi-label">支出合計</div><div class="s-kpi-value" id="skExpense">¥0</div></div></div>
    <div class="s-kpi-card balance"><div class="s-kpi-icon"><i class="fas fa-wallet"></i></div><div class="s-kpi-body"><div class="s-kpi-label">当月収支</div><div class="s-kpi-value" id="skBalance">¥0</div></div></div>
  </div>

  <div class="summary-card">
    <div class="summary-card-header"><i class="fas fa-box-open"></i> ボックス別支出（予算比較）</div>
    <div class="box-summary-list" id="boxSummaryList"></div>
  </div>

  <div class="summary-card">
    <div class="summary-card-header"><i class="fas fa-list-ul"></i> カテゴリ別支出明細</div>
    <div id="catDetailList"></div>
  </div>

  <div class="summary-card">
    <div class="summary-card-header"><i class="fas fa-chart-line"></i> 月次収支推移（12ヶ月）</div>
    <div style="height:220px; position:relative;"><canvas id="trendChart"></canvas></div>
  </div>

  <div class="summary-card">
    <div class="summary-card-header"><i class="fas fa-credit-card"></i> 支払い方法別支出トレンド（6ヶ月）</div>
    <div style="height:200px; position:relative;"><canvas id="pmTrendChart"></canvas></div>
  </div>

  <div class="summary-card">
    <div class="summary-card-header"><i class="fas fa-chart-area"></i> 残高推移（12ヶ月）</div>
    <div style="height:200px; position:relative;"><canvas id="balanceTrendChart"></canvas></div>
  </div>

  <div class="summary-card">
    <div class="summary-card-header"><i class="fas fa-clipboard-check"></i> 棚卸し差異履歴</div>
    <div id="closingHistoryList"></div>
  </div>

</main>

<div class="loading-overlay hidden" id="loadingOverlay"><div class="loading-spinner"></div></div>
<script type="module" src="summary.js"></script>
</body>
</html>
